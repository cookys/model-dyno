name: deploy-pages

on:
  # Source changes remain deliberate/manual. The private producer's own manual
  # publish workflow may push only a cleared PublicBundle snapshot; that path
  # automatically deploys the resulting public-data update.
  push:
    branches: [main]
    paths:
      - 'public/public-bundles/**'
  workflow_dispatch: {}

permissions:
  contents: read

concurrency:
  group: pages
  cancel-in-progress: false

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout source
        uses: actions/checkout@v6

      - name: Set up Node
        uses: actions/setup-node@v4
        with:
          node-version: '22'
          cache: npm

      - name: Install dependencies
        run: npm ci

      - name: Test public source and snapshot
        run: npm test

      - name: Build static site
        run: npm run build

      - name: Verify deploy artifact
        run: |
          test -f dist/index.html
          test -f dist/public-bundles/index.json
          if grep -rInE 'agent_diff|pre_fix_log|post_fix_log|/home/[A-Za-z0-9._-]+/' \
               --include='*.json' --include='*.html' --include='*.js' dist; then
            echo 'private execution material detected in dist' >&2
            exit 1
          fi

      - name: Configure GitHub Pages
        uses: actions/configure-pages@v5

      - name: Upload GitHub Pages artifact
        uses: actions/upload-pages-artifact@v4
        with:
          path: dist

  deploy:
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}
    runs-on: ubuntu-latest
    needs: build
    permissions:
      pages: write
      id-token: write
    steps:
      - name: Deploy GitHub Pages
        id: deployment
        uses: actions/deploy-pages@v4
